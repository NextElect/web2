    <script>
        /* 🌟 GoogleドライブのURLを自動変換する関数（最新・安定版！） */
        function convertDriveImageUrl(url) {
            if (!url) return '';
            const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                // 確実に表示される thumbnail 形式に変換（横幅1000pxの綺麗で軽い画像を取得）
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
            }
            return url;
        }

        const SHEET_ID = '1hLWEqfJHSYtHm4iIYa53wFP2eFq6mSdjlKo8hhfUUVc'; 
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        const targetId = new URLSearchParams(window.location.search).get('id');
        const getVal = (row, idx) => (row.length > idx && row[idx]) ? (row[idx].f || row[idx].v) : '';

        fetch(url).then(res => res.text()).then(text => {
            const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1]);
            const row = json.table.rows.find(r => getVal(r.c, 0) === targetId);

            if (row) {
                const d = row.c;
                const date = getVal(d, 1);
                const category = getVal(d, 2);
                const title = getVal(d, 3);
                const imgUrl = getVal(d, 4); // E列：画像
                const body = getVal(d, 6);   // G列：本文
                const pdf = getVal(d, 7);    // H列：PDF

                // カテゴリー色分け
                let catClass = 'cat-default';
                if (category === '活動報告') catClass = 'cat-report';
                if (category === 'イベント') catClass = 'cat-event';
                if (category === '重要') catClass = 'cat-important';
                if (category === '幹事日記') catClass = 'cat-event';

                // 🌟 画像表示（幹事日記以外で画像がある場合、最新の変換関数を通す）
                let imageHTML = '';
                if (category !== '幹事日記' && imgUrl) {
                    const finalImgUrl = convertDriveImageUrl(imgUrl);
                    imageHTML = `<div class="article-main-img"><img src="${finalImgUrl}" alt="記事画像"></div>`;
                }

                // PDF表示
                let pdfHTML = '';
                if (pdf && pdf.includes('drive.google.com')) {
                    const embedUrl = pdf.replace('/view', '/preview').split('?')[0];
                    pdfHTML = `<div class="pdf-container"><iframe src="${embedUrl}"></iframe></div>`;
                }

                document.getElementById('article-content').innerHTML = `
                    <div class="news-meta" style="margin-bottom:20px; display:flex; align-items:center; gap:15px;">
                        <span class="news-date" style="font-size:18px; font-weight:800;">${date}</span>
                        <span class="news-category ${catClass}">${category}</span>
                    </div>
                    <h1 class="article-title">${title}</h1>
                    ${imageHTML}
                    <div class="article-body" style="font-size:17px; line-height:1.8; margin-bottom:40px;">
                        ${body.replace(/\n/g, '<br>')}
                    </div>
                    ${pdfHTML}
                `;
            } else {
                document.getElementById('article-content').innerHTML = '記事が見つかりません。';
            }
        });
    </script>

    <script>
        const hamburger = document.getElementById('hamburger');
        const headerNav = document.querySelector('.header-nav');
        if(hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                headerNav.classList.toggle('active');
            });
        }

        const dropdowns = document.querySelectorAll('.dropdown');
        dropdowns.forEach(dropdown => {
            const dropbtn = dropdown.querySelector('.dropbtn');
            if (dropbtn) {
                dropbtn.addEventListener('click', (e) => {
                    e.preventDefault(); // リンクの移動を完全にストップ
                    
                    // 他の開いているメニューを閉じる（任意：開けっ放しにしたい場合は下の3行を消してもOKです）
                    dropdowns.forEach(other => {
                        if (other !== dropdown) other.classList.remove('active');
                    });

                    // タップしたメニューを開閉する
                    dropdown.classList.toggle('active');
                });
            }
        });
    </script>
