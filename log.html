    <!-- ★ スプレッドシートから一覧を自動生成するプログラム ★ -->
    <script>
        const ACTIVITY_SHEET_ID = '1hLWEqfJHSYtHm4iIYa53wFP2eFq6mSdjlKo8hhfUUVc'; 
        const url = `https://docs.google.com/spreadsheets/d/${ACTIVITY_SHEET_ID}/gviz/tq?tqx=out:json`;

        const getVal = (row, idx) => (row.length > idx && row[idx]) ? (row[idx].f || row[idx].v) : '';

        fetch(url)
            .then(response => response.text())
            .then(text => {
                const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
                const rows = JSON.parse(jsonString).table.rows;
                
                rows.reverse();

                const activityList = document.getElementById('activity-list');
                activityList.innerHTML = ''; 

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i].c;
                    if (!row || !row[0]) continue; 

                    const id = getVal(row, 0);
                    const date = getVal(row, 1);
                    const category = getVal(row, 2) || '活動報告';
                    if (category !== '活動報告') continue;
                    const title = getVal(row, 3)
                    let imgUrl = getVal(row, 5); // F列: 画像
                    let bodyText = getVal(row, 6); // G列: 本文
                    if (!bodyText) continue;

                    // ★重要：本文が空っぽの記事（ただのお知らせ）は活動記録に出さない！
                    if (!bodyText) continue;

                    if (!imgUrl) imgUrl = 'https://via.placeholder.com/400x300/e9ecef/868e96?text=No+Image';
                    let snippet = bodyText.length > 60 ? bodyText.substring(0, 60) + '...' : bodyText;

                    const articleHTML = `
                        <article class="activity-card">
                            <div class="activity-img">
                                <img src="${imgUrl}" alt="活動写真">
                            </div>
                            <div class="activity-content">
                                <div class="activity-meta">
                                    <span class="activity-date">${date}</span>
                                    <span class="activity-tag">${category}</span>
                                </div>
                                <h2 class="activity-heading">${title}</h2>
                                <p class="activity-text" style="font-size:14px; color:#666;">${snippet}</p>
                                <div style="margin-top: 15px; text-align: right;">
                                    <a href="article.html?id=${id}" class="news-more-btn" style="padding: 5px 15px; font-size: 13px;">続きを読む &rarr;</a>
                                </div>
                            </div>
                        </article>
                    `;
                    activityList.innerHTML += articleHTML;
                }
            }).catch(e => console.error(e));
    </script>

    <script>
        const hamburger = document.getElementById('hamburger');
        const headerNav = document.querySelector('.header-nav');
        if(hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                headerNav.classList.toggle('active');
            });
        }
    </script>

</body>
