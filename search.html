<html lang="ja">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="header-logo">
            <img src="ロゴ.png" alt="クラブロゴ" class="logo-img">
        </div>
        
        <nav class="header-nav">
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">概要</a></li>
                <li><a href="activity.html">活動内容</a></li>
                <li class="dropdown">
                    <a href="log.html" class="dropbtn">活動記録 ▾</a>
                    <ul class="dropdown-content">
                        <li><a href="log.html">これまでの活動</a></li>
                        <li><a href="diary.html">幹事日記</a></li>
                    </ul>
                </li>
                <li><a href="schedule.html">スケジュール</a></li>
                <li><a href="news.html">お知らせ</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
            </ul>
        </nav>

        <div class="header-right">
            <form action="search.html" method="get" class="header-search" style="margin: 0;">
                <input type="text" name="q" placeholder="サイト内検索..." required>
                <button type="submit">検索</button>
            </form>
        </div>
    </header>

    <div class="page-body">
        <div class="page-header">
            <h1 class="page-title">Search Results</h1>
            <p class="page-subtitle" id="search-keyword-display">検索結果</p>
        </div>

        <div class="news-container" style="max-width: 1000px; margin: 0 auto;">
            <ul class="news-list" id="search-results-list">
                <li class="news-loading">検索中...🔍</li>
            </ul>
        </div>

        <div class="back-home-container">
            <a href="index.html" class="back-home-btn"><span>🏠</span> ホームに戻る</a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-info">
                <div class="footer-logo">長野大学ローターアクトクラブ</div>
                <p class="footer-address">〒386-1298<br>長野県上田市下之郷658-1 長野大学内</p>
                <div class="footer-contact">
                    <a href="mailto:naganouni.rac@gmail.com" class="contact-link">
                        <span class="contact-icon">✉️</span> naganouni.rac@gmail.com
                    </a>
                </div>
            </div>

            <div class="footer-links">
                <div class="footer-logo-right">
                    <img src="ロゴ.png" alt="クラブロゴ" class="footer-logo-img">
                </div>
                
                <a href="https://www.instagram.com/nagano_univ.rac" target="_blank" class="instagram-link">
                    <span class="inst-icon">📸</span> Instagram
                </a>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="copyright">&copy; 2026 Nagano University Rotary Act Club</p>
        </div>
    </footer>


    <script>
        // URLから検索キーワード（q）を取得
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        
        const keywordDisplay = document.getElementById('search-keyword-display');
        const resultsList = document.getElementById('search-results-list');

        if (!query) {
            keywordDisplay.textContent = "キーワードが入力されていません";
            resultsList.innerHTML = '<li class="news-error">検索窓にキーワードを入力してください。</li>';
        } else {
            keywordDisplay.textContent = `「${query}」の検索結果`;

            const SHEET_ID = '1hLWEqfJHSYtHm4iIYa53wFP2eFq6mSdjlKo8hhfUUVc'; 
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            const getVal = (row, idx) => (row.length > idx && row[idx]) ? (row[idx].f || row[idx].v) : '';

            fetch(url).then(res => res.text()).then(text => {
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1]);
                const rows = json.table.rows;
                rows.reverse(); // 最新順にする

                resultsList.innerHTML = '';
                let matchCount = 0;

                // 検索キーワードを小文字・全角半角区別せずに比較するための準備
                const lowerQuery = query.toLowerCase();

                rows.forEach(r => {
                    const row = r.c;
                    if (!row || !row[0]) return;

                    const id = getVal(row, 0);
                    const date = getVal(row, 1);
                    const category = getVal(row, 2) || 'お知らせ';
                    const title = getVal(row, 3);
                    const bodyText = getVal(row, 6);

                    // 🌟 タイトルか本文にキーワードが含まれているかチェック！
                    const titleMatch = title.toLowerCase().includes(lowerQuery);
                    const bodyMatch = bodyText.toLowerCase().includes(lowerQuery);

                    if (titleMatch || bodyMatch) {
                        matchCount++;

                        let catClass = 'cat-default';
                        if (category === '活動報告') catClass = 'cat-report';
                        if (category === 'イベント') catClass = 'cat-event';
                        if (category === '重要') catClass = 'cat-important';
                        if (category === '幹事日記') catClass = 'cat-event';

                        // キーワードが含まれる部分をハイライト（本文の抜粋）
                        let snippet = '';
                        if (bodyText) {
                            snippet = bodyText.length > 80 ? bodyText.substring(0, 80) + '...' : bodyText;
                        }

                        resultsList.innerHTML += `
                            <li class="news-item">
                                <div class="news-link" style="display: flex; align-items: center; position: relative;">
                                    <div class="news-meta" style="flex-shrink: 0; position: relative; z-index: 11;">
                                        <span class="news-date">${date}</span>
                                        <span class="news-category ${catClass}">${category}</span>
                                    </div>
                                    <a href="article.html?id=${id}" style="flex-grow: 1; margin-left: 20px; text-decoration: none; color: inherit; display: block; z-index: 5;">
                                        <div class="news-title" style="font-weight: 800;">${title}</div>
                                        <div style="font-size: 13px; color: #666; margin-top: 5px;">${snippet}</div>
                                    </a>
                                </div>
                            </li>
                        `;
                    }
                });

                if (matchCount === 0) {
                    resultsList.innerHTML = `<li class="news-error">「${query}」に一致する記事は見つかりませんでした。</li>`;
                }
            }).catch(err => {
                resultsList.innerHTML = `<li class="news-error">データの読み込みに失敗しました。</li>`;
            });
        }
    </script>

    <script>
        const hamburger = document.getElementById('hamburger');
        const headerNav = document.querySelector('.header-nav');
        if(hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                headerNav.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
