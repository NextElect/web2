    <div class="page-body">

        <div class="activity-wrapper" id="diary-list">
            <div class="news-loading">日記を読み込んでいます...⏳</div>

    <script>
        const SHEET_ID = '1hLWEqfJHSYtHm4iIYa53wFP2eFq6mSdjlKo8hhfUUVc'; 
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        const getVal = (row, idx) => (row.length > idx && row[idx]) ? (row[idx].f || row[idx].v) : '';

        fetch(url).then(res => res.text()).then(text => {
            const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1]);
            const rows = json.table.rows;
            rows.reverse();

            const list = document.getElementById('diary-list');
            list.innerHTML = '';
            let count = 0;

            rows.forEach(r => {
                const d = r.c;
                if (getVal(d, 2) === '幹事日記') {
                    count++;
                    const id = getVal(d, 0), date = getVal(d, 1), title = getVal(d, 3), body = getVal(d, 6), pdf = getVal(d, 7);
                    const snippet = body ? (body.length > 80 ? body.substring(0, 80) + '...' : body) : '';
                    
                    let pdfIcon = pdf ? '<span style="background:#eef; padding:2px 8px; border-radius:4px; font-size:12px; margin-right:10px; border:1px solid var(--accent-blue);">📄 PDFあり</span>' : '';

                    list.innerHTML += `
                        <article class="activity-card">
                            <div class="activity-content" style="width: 100%;">
                                <div class="activity-meta">
                                    <span class="activity-date">${date}</span>
                                    <span class="activity-tag" style="background:var(--accent-yellow); color:#333;">幹事日記</span>
                                    ${pdfIcon}
                                </div>
                                <h2 class="activity-heading">${title}</h2>
                                <p class="activity-text">${snippet}</p>
                                <div style="text-align:right; margin-top:15px;">
                                    <a href="article.html?id=${id}" class="news-more-btn">詳細・PDFを見る &rarr;</a>
                                </div>
                            </div>
                        </article>`;
                }
            });
            if(count === 0) list.innerHTML = '<div>まだ投稿がありません。</div>';
        });
    </script>
